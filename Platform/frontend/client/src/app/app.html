<div class="layout">
  <aside class="sidebar">
    <h2>Learning<br />Platform</h2>

    @if (isLoggedIn()) {
      <p class="user-badge">Signed in as: <strong>{{ getUsername() }}</strong></p>
    }

    <nav>
      <button class="nav-btn" (click)="goTo('/catalog')">Catalog</button>
      <button class="nav-btn" (click)="goTo('/my-courses')">My Courses</button>
      <button class="nav-btn" (click)="goTo('/my-tasks')">My Tasks</button>
      <button class="nav-btn" (click)="goTo('/profile')">Profile</button>

      @if (!isLoggedIn()) {
        <button class="nav-btn" (click)="goTo('/login')">Login</button>
      }

      @if (isLoggedIn()) {
        <button class="logout-btn" (click)="logout()">Logout</button>
      }
    </nav>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
