<section class="page auth-page">

  <p class="auth-brand">English Learning Platform</p>

  <div class="auth-card">
    <div class="mode-tabs" aria-label="Authentication mode">
      <button type="button" [class.active]="mode === 'login'" (click)="switchMode('login')">Login</button>
      <button type="button" [class.active]="mode === 'register'" (click)="switchMode('register')">Register</button>
    </div>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

    @if (mode === 'login') {
      <form [formGroup]="loginForm" (ngSubmit)="submitLogin()" class="auth-form">
        <label>
          <span>Username</span>
          <input type="text" formControlName="username" autocomplete="username">
        </label>

        <label>
          <span>Password</span>
          <input type="password" formControlName="password" autocomplete="current-password">
        </label>

        <button type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing in…' : 'Sign in' }}
        </button>

        <a class="forgot-link" routerLink="/forgot-password">Forgot password?</a>
      </form>
    } @else {
      <form [formGroup]="registerForm" (ngSubmit)="submitRegister()" class="auth-form">
        <label>
          <span>Username</span>
          <input type="text" formControlName="username" autocomplete="username">
        </label>

        <label>
          <span>Email</span>
          <input type="email" formControlName="email" autocomplete="email">
        </label>

        <label>
          <span>Password</span>
          <input type="password" formControlName="password" autocomplete="new-password">
        </label>

        <label>
          <span>Role</span>
          <select formControlName="role">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
        </label>

        <label>
          <span>Bio</span>
          <textarea formControlName="bio" rows="3"></textarea>
        </label>

        <button type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Creating account…' : 'Create account' }}
        </button>
      </form>
    }
  </div>

</section>
