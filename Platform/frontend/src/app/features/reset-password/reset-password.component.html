<section class="page reset-page">
  <div class="reset-header">
    <h1>Reset password</h1>
    <p>Choose a new password for your English Learning Platform account.</p>
  </div>

  <article class="reset-card">
    @if (successMessage) {
      <div class="message success">{{ successMessage }}</div>
    }

    @if (errorMessage) {
      <div class="message error">{{ errorMessage }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()" class="reset-form">
      <label>
        <span>New password</span>
        <input type="password" formControlName="newPassword" autocomplete="new-password">
      </label>

      <label>
        <span>Confirm password</span>
        <input type="password" formControlName="confirmPassword" autocomplete="new-password">
      </label>

      <button type="submit" [disabled]="isSubmitting || form.invalid || !uid || !token">
        {{ isSubmitting ? 'Saving password...' : 'Reset password' }}
      </button>
    </form>

    <a class="back-link" routerLink="/auth">Back to sign in</a>
  </article>
</section>
